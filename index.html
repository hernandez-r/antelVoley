<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Antel Voley: planificador semanal para encontrar el mejor horario entre todos."
    />
    <title>Antel Voley</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="contenedor">
      <header class="encabezado">
        <p class="etiqueta">Planificador semanal</p>
        <h1>Antel Voley</h1>
        <p class="descripcion">Encontramos el horario en el que podemos más.</p>
      </header>

      <section class="panel controles" aria-labelledby="titulo-semana">
        <div>
          <h2 id="titulo-semana">Semana</h2>
          <p id="rango-semana" class="texto-ayuda"></p>
        </div>
        <div class="navegacion-semana" aria-label="Cambiar semana">
          <button id="semana-anterior" class="boton secundario compacto" type="button">
            <span aria-hidden="true">←</span> Anterior
          </button>
          <button id="semana-actual" class="boton secundario compacto" type="button">Esta semana</button>
          <button id="semana-siguiente" class="boton secundario compacto" type="button">
            Siguiente <span aria-hidden="true">→</span>
          </button>
        </div>
        <nav class="navegador-dias-movil" aria-label="Elegir día de la semana">
          <span class="titulo-dias-movil">Elegí un día</span>
          <div id="dias-movil" class="dias-movil"></div>
        </nav>
      </section>

      <section class="panel" aria-labelledby="titulo-resultados">
        <div class="cabecera-seccion">
          <div>
            <h2 id="titulo-resultados">Coincidencias</h2>
            <p id="resumen-resultados" class="texto-ayuda">Conectando con el grupo…</p>
          </div>
          <span id="estado-conexion" class="estado" role="status" aria-live="polite">Conectando</span>
        </div>
        <div id="resultados" class="grilla-contenedor" aria-live="polite"></div>
      </section>

      <section class="panel" aria-labelledby="titulo-persona">
        <div>
          <h2 id="titulo-persona">Tu disponibilidad</h2>
          <p class="texto-ayuda">Elegí tu nombre antes de marcar horarios.</p>
        </div>

        <label class="campo" for="persona">
          <span>¿Quién sos?</span>
          <select id="persona">
            <option value="">Seleccioná tu nombre</option>
          </select>
        </label>

        <p id="mensaje" class="mensaje" role="status" aria-live="polite"></p>
        <div id="disponibilidad" class="grilla-contenedor"></div>
      </section>

      <footer class="pie">
        Los cambios se comparten automáticamente con todo el grupo.
      </footer>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
